<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IntegrateIT — Ops Portal — Driver Catalog</title>
<style>
  :root{--bg:#0a0d13;--panel:#141a26;--panel2:#1a2332;--line:#26303f;--line2:#32405a;--txt:#edf2f9;--mut:#8794a8;--mut2:#5d6a7e;
    --accent:#0157FF;--accent1:#3d7dff;--accent2:#7fb2ff;--good:#34d399;--warn:#fbbf24;--bad:#f87171;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;--mono:ui-monospace,Menlo,monospace}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--font);padding:28px 20px;
    background-image:radial-gradient(1100px 520px at 80% -10%,rgba(61,125,255,.10),transparent 60%)}
  .wrap{max-width:980px;margin:0 auto}
  h1{font-size:20px;display:flex;align-items:center;gap:12px;margin:0 0 14px}
  h1 img{height:26px}
  /* shared portal nav */
  nav{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:18px;padding-bottom:0}
  nav a{font-size:13px;font-weight:600;color:var(--mut);text-decoration:none;padding:9px 14px;border-radius:9px 9px 0 0;
    border:1px solid transparent;border-bottom:none;position:relative;top:1px}
  nav a:hover{color:var(--txt)}
  nav a.on{color:var(--txt);background:var(--panel);border-color:var(--line);border-bottom:1px solid var(--bg)}
  .sub{color:var(--mut);font-size:13px;margin:-6px 0 20px}
  .sub b{color:var(--accent2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .dcard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:17px 19px;display:flex;flex-direction:column}
  .dcard h3{margin:0 0 2px;font-size:15.5px}
  .dcard .slug{font-family:var(--mono);font-size:11.5px;color:var(--mut2)}
  .ver{display:inline-block;align-self:flex-start;font-size:12px;font-weight:800;color:var(--accent2);background:rgba(61,125,255,.13);
    border:1px solid var(--line2);border-radius:20px;padding:3px 10px;margin:10px 0}
  .ver small{color:var(--mut);font-weight:600}
  .notes{font-size:13px;color:#cdd7e6;margin:4px 0 12px;line-height:1.5;flex:1}
  .acts{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:12px}
  .ib{font-size:12px;font-weight:700;border:1px solid var(--line2);border-radius:9px;padding:7px 11px;color:var(--txt);
    text-decoration:none;background:var(--panel2)}
  .ib.pri{background:linear-gradient(135deg,var(--accent1),var(--accent));border:0;color:#fff}
  .empty{text-align:center;color:var(--mut2);padding:50px 0;font-size:14px;grid-column:1/-1}
  .powered{margin-top:34px;padding-top:26px;border-top:1px solid var(--line);text-align:center}
  .powered .pb{font-size:11px;font-weight:600;letter-spacing:.4em;text-transform:uppercase;color:var(--mut);margin:0 0 12px;padding-left:.4em}
  .powered img{height:34px;opacity:.95}
</style>
</head>
<body>
<div class="wrap">
  <h1><img src="https://relay.integrateit.dev/app/logo.png" alt="IntegrateIT"> Ops Portal</h1>
  <nav>
    <a href="https://relay.integrateit.dev/ops/index.html">Service Requests</a>
    <a href="https://relay.integrateit.dev/ops/licenses.html">Licenses</a>
    <a href="https://relay.integrateit.dev/ops/drivers.html" class="on">Driver Catalog</a>
  </nav>
  <div class="sub">Every published IntegrateIT Control4 driver — live from the update channel, so this
    always shows the <b>current</b> version dealers receive over the air.</div>
  <div id="grid" class="grid"><div class="empty">Loading the latest from the channel…</div></div>
  <div class="powered"><div class="pb">Powered by</div><img src="https://relay.integrateit.dev/app/logo.png" alt="IntegrateIT"></div>
</div>
<script>
// Read the live self-update channel (the SAME source the drivers update from),
// so the catalog can never drift from what's actually published. raw.githubusercontent
// sends permissive CORS; ?t= busts any edge cache for freshness.
const CHANNEL='https://raw.githubusercontent.com/Integrateit2026/brand-assets/main/control4';
const esc=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const bust=u=>u+(u.includes('?')?'&':'?')+'t='+Date.now();
function card(d){
  return `<div class="dcard">
    <h3>${esc(d.name||d.slug)}</h3>
    <div class="slug">${esc(d.slug)}</div>
    <div class="ver">v${esc(d.version||'?')}${d.xml_version?` <small>· xml ${esc(d.xml_version)}</small>`:''}</div>
    <div class="notes">${esc(d.notes||'')}</div>
    <div class="acts">
      ${d.url?`<a class="ib pri" href="${esc(d.url)}" download>Download .c4z</a>`:''}
      <a class="ib" href="${CHANNEL}/${encodeURIComponent(d.slug)}/version.json" target="_blank" rel="noopener">manifest</a>
    </div>
  </div>`;
}
async function load(){
  const grid=document.getElementById('grid');
  try{
    // index.json lists the published slugs; fall back to the two known drivers.
    let slugs;
    try{ slugs=await (await fetch(bust(CHANNEL+'/index.json'))).json(); }
    catch(_){ slugs=['integrateit_mm815_bond','integrateit_optimus']; }
    const drivers=(await Promise.all(slugs.map(async slug=>{
      try{ const v=await (await fetch(bust(`${CHANNEL}/${slug}/version.json`))).json(); return {slug,...v}; }
      catch(_){ return null; }
    }))).filter(Boolean);
    if(!drivers.length){ grid.innerHTML='<div class="empty">No drivers published yet.</div>'; return; }
    grid.innerHTML=drivers.map(card).join('');
  }catch(e){
    // last-ditch: the relay's own store
    try{
      const {drivers=[]}=await (await fetch('/api/drivers')).json();
      grid.innerHTML=drivers.length?drivers.map(d=>card({slug:d.slug,name:d.name,version:d.version,xml_version:d.xmlVersion,notes:d.notes,url:`/drivers/${d.slug}/${d.file}`})).join(''):'<div class="empty">No drivers published yet.</div>';
    }catch(_){ grid.innerHTML='<div class="empty">Could not reach the driver channel.</div>'; }
  }
}
load();
</script>
</body>
</html>
